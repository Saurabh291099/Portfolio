{% extends 'web_app/base.html' %}
{% load static %}


{% block head %}
<title>Add_Blogs</title>
{% endblock %}


{% block body %}
<div style="border:1px solid black;" class="row">
    <div style="border:1px solid black;margin-left:25%;border-radius:10px;box-shadow:2px 2px 4px 4px grey;" class="col-lg-6 col-md-6 col-sm-6 col-6 my-4">
        <p style="text-align:center;"><strong>ADD BLOGS</strong></p>
        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-12">
                <div class="row">
                    <div style="margin-left:16%;" class="col-lg-8 col-md-8 col-sm-8 col-8 my-4">
                        <form>
                            <label><strong>Title</strong></label>
                            <input style="width:100%;" type="text" name="title" placeholder="title">
                            <label><strong>Message</strong></label>
                            <textarea style="width:100%;" type="text" name="message" placeholder="message"></textarea>
                            <label><strong>Author</strong></label>
                            <input style="width:100%;" type="text" name="author_by" placeholder="author">
                            <label><strong>Author</strong></label>
                            <select name="feild" id="cars">
                                <option value="">--select--</option>
                                <option value="saab">Saab</option>
                                <option value="opel">Opel</option>
                                <option value="audi">Audi</option>
                              </select>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
